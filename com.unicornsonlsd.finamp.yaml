app-id: com.unicornsonlsd.finamp
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: finamp
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:ro
  - --share=network
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: finamp
    buildsystem: simple
    build-commands:
      - cp -a bundle/. /app/
      - chmod +x /app/finamp
      - mkdir -p /app/bin
      - ln -s /app/finamp /app/bin/finamp
      - install -Dm644 icon_foreground_square.svg /app/share/icons/hicolor/scalable/apps/com.unicornsonlsd.finamp.svg
      - m4 finamp.desktop.m4 > com.unicornsonlsd.finamp.desktop
      - desktop-file-edit --set-key=Exec --set-value=finamp com.unicornsonlsd.finamp.desktop
      - desktop-file-edit --set-icon=com.unicornsonlsd.finamp com.unicornsonlsd.finamp.desktop
      - install -Dm644 com.unicornsonlsd.finamp.desktop -t /app/share/applications/
      - install -Dm644 com.unicornsonlsd.finamp.metainfo.xml -t /app/share/metainfo/
    sources:
      # Fix missing license file
      - type: file
        url: https://raw.githubusercontent.com/UnicornsOnLSD/finamp/20c2c15448415633385720b840ce6c86609cfb05/LICENSE
        sha256: 1f256ecad192880510e84ad60474eab7589218784b9a50bc7ceee34c2b91f1d5

      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/UnicornsOnLSD/finamp/releases/download/0.9.24-beta/finamp-0.9.24-beta-linux-x64.tar.gz
        sha256: c2bf3d10a9708cf7a25521448c340b617ea93303d610da9b4dde998af0c11254
        strip-components: 0
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/UnicornsOnLSD/finamp/releases/download/0.9.24-beta/finamp-0.9.24-beta-linux-arm64.tar.gz
        sha256: e26294b9797945b5c39289f302218b4aba147b6abbfa0c172c31a4b34bd31de4
        strip-components: 0
      - type: file
        url: https://raw.githubusercontent.com/jmshrv/finamp/dac612650747e832e28690eb639faaff02f242c5/assets/icon/icon_foreground_square.svg
        sha256: 9c2b90c09bc34cb128e6e62cf15792df78b157c35092522d6d512af518c11d5c
    modules:

      - name: libmpv
        buildsystem: meson
        config-opts:
          - -Dlibmpv=true
          - -Dbuild-date=false
          - -Dalsa=disabled
          - -Dmanpage-build=disabled
        cleanup:
          - /share/applications
          - /share/bash-completion
          - /share/fish
          - /share/icons
          - /share/zsh
        sources:
          - type: archive
            url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
            sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
        modules:
          # Use luajit module from the shared-modules
          - shared-modules/luajit/luajit.json

          - name: libass
            config-opts:
              - --disable-static
            sources:
              - type: archive
                url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.gz
                sha256: a886b3b80867f437bc55cff3280a652bfa0d37b43d2aff39ddf3c4f288b8c5a8

          - name: uchardet
            buildsystem: cmake-ninja
            config-opts:
              - -DCMAKE_BUILD_TYPE=Release
              - -DBUILD_STATIC=0
              - -DBUILD_BINARY=OFF
              - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            sources:
              - type: archive
                url: https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz
                sha256: e97a60cfc00a1c147a674b097bb1422abd9fa78a2d9ce3f3fdcc2e78a34ac5f0

          - name: rubberband
            buildsystem: meson
            config-opts:
              - -Ddefault_library=shared
            cleanup:
              - /bin
              - /lib/ladspa
            sources:
              - type: archive
                url: https://breakfastquay.com/files/releases/rubberband-3.3.0.tar.bz2
                sha256: d9ef89e2b8ef9f85b13ac3c2faec30e20acf2c9f3a9c8c45ce637f2bc95e576c

          - name: mujs
            cleanup:
              - /bin
            no-autogen: true
            make-args:
              - release
              - prefix=/app
            make-install-args:
              - prefix=/app
              - install-shared
            sources:
              - type: archive
                url: https://github.com/ccxvii/mujs/archive/refs/tags/1.3.4.tar.gz
                sha256: c015475880f6a382e706169c94371a7dd6cc22078832f6e0865af8289c2ef42b

          - name: libplacebo
            buildsystem: meson
            config-opts:
              - -Dvulkan=enabled
              - -Dshaderc=enabled # Use sharedc module from the runtime
              - -Ddemos=false
            sources:
              - type: git
                url: https://github.com/haasn/libplacebo
                tag: v7.360.1
                commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

